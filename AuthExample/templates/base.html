<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Auth</a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav ms-auto">

                {% if user.is_authenticated %}

                    {% if user.is_student %}
                        <li class="nav-item"><a class="nav-link" href="/">Student Dashboard</a></li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link" href="/">Teacher Dashboard</a></li>
                    {% endif %}

                    <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>

                {% else %}

                    <li class="nav-item"><a class="nav-link" href="{% url 'student_register' %}">Register Student</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'register_teacher' %}">Register Teacher</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>

                {% endif %}

            </ul>

        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
